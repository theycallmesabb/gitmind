version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: github_assistant_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: github_assistant
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5435:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: github_assistant_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  qdrant:
    image: qdrant/qdrant:latest
    container_name: github_assistant_qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage

  backend:
    build: ./backend
    container_name: github_assistant_backend
    restart: unless-stopped
    ports:
      - "8082:8080"
    environment:
      - PORT=8080
      - DEV_MODE=true
      - JWT_SECRET=compose-jwt-secret-key-123
      - DATABASE_URL=postgres://postgres:postgres@postgres:5432/github_assistant?sslmode=disable
      - REDIS_ADDR=redis:6379
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - GITHUB_TOKEN=${GITHUB_TOKEN}
    depends_on:
      - postgres
      - redis
      - qdrant

  frontend:
    build: ./frontend
    container_name: github_assistant_frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8080
    depends_on:
      - backend

volumes:
  postgres_data:
  redis_data:
  qdrant_data:
